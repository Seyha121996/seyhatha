plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystorePropertiesDev = new Properties()
def keystorePropertiesFileDev = rootProject.file('dev-key.properties')
if (keystorePropertiesFileDev.exists()) {
    keystorePropertiesDev.load(new FileInputStream(keystorePropertiesFileDev))
}  
android {
    namespace = "com.business.literacy"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion
    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }  

    kotlinOptions {
        jvmTarget = '11'
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.business.literacy"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdkVersion 24
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        multiDexEnabled true  
    }

    signingConfigs {
        releaseDev {
            keyAlias keystorePropertiesDev['keyAlias']
            keyPassword keystorePropertiesDev['keyPassword']
            storeFile keystorePropertiesDev['storeFile'] ? file(keystorePropertiesDev['storeFile']) : null
            storePassword keystorePropertiesDev['storePassword']
        }
    }

    flavorDimensions += "app"

    productFlavors {
        create("dev") {
            dimension "app"
            resValue "string", "app_name", "AIMS - BLT"
            applicationIdSuffix ".dev"
            signingConfig signingConfigs.releaseDev
        }
    }
}

flutter {
    source = "../.."
}
dependencies {
    implementation ('com.kaopiz:kprogresshud:1.2.0') // lowercase 'k'  
    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4") 
    implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.1.0"
    
}
